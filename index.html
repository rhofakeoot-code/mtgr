<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نعناع</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <section id="login-page" class="page active">
            <div class="login-header">
                <i class="fa-solid fa-xmark close-btn"></i>
                <span class="close-text">اغلاق</span>
            </div>
            <div class="login-logo">
                <img src="https://dummyimage.com/150x150/7CB342/fff.png&text=Logo" alt="النعناع">
                <h2>النعناع</h2>
            </div>
            <div class="login-form">
                <h3 style="text-align: center; margin-bottom: 30px;">تسجيل الدخول</h3>
                
                <button class="btn-google" onclick="navigateTo('home-page')">
                    <i class="fa-brands fa-google"></i> الدخول بواسطة جوجل
                </button>
                
                <button class="btn-guest" onclick="navigateTo('home-page')">
                    <i class="fa-regular fa-user"></i> دخول كزائر
                </button>
            </div>
        </section>

        <section id="home-page" class="page">
            <header class="top-header">
                <div class="logo-small">
                    <img src="https://dummyimage.com/50x50/7CB342/fff.png&text=Logo" alt="النعناع">
                </div>
                <div class="contact-us">تواصل معنا <i class="fa-solid fa-phone-volume"></i></div>
                <div class="header-icons">
                    <div class="cart-icon" onclick="navigateTo('cart-page')">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="badge">1</span>
                    </div>
                    <i class="fa-regular fa-bell"></i>
                </div>
            </header>

            <div class="main-content">
                <h2 class="page-title">الرئيسية</h2>
                
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="ابحث عن منتج...">
                </div>

                <div class="banner">
                    <img src="https://dummyimage.com/400x150/7CB342/fff.png&text=Banner" alt="Banner">
                </div>

                <div class="section-header">
                    <h3>العروض</h3>
                    <span class="more">المزيد <i class="fa-solid fa-angle-left"></i></span>
                </div>
                <div class="offers-grid">
                    <img src="https://dummyimage.com/400x150/ff9800/fff.png&text=عرض+خاص+1" alt="عرض">
                    <img src="https://dummyimage.com/400x150/f44336/fff.png&text=عرض+خاص+2" alt="عرض">
                </div>

                <div class="section-header mt-20">
                    <h3>الأقسام</h3>
                    <span class="more">المزيد <i class="fa-solid fa-angle-left"></i></span>
                </div>
                <div class="categories-grid" id="categories-container">
                    </div>

                <div class="section-header mt-20">
                    <h3>التخفيضات</h3>
                    <span class="more">المزيد <i class="fa-solid fa-angle-left"></i></span>
                </div>
                <div class="products-grid" id="products-container">
                    </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item active" onclick="navigateTo('home-page')">
                    <i class="fa-solid fa-house"></i>
                    <span>الرئيسية</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-percent"></i>
                    <span>التخفيضات</span>
                </div>
                <div class="nav-item">
                    <i class="fa-regular fa-heart"></i>
                    <span>المفضلة</span>
                </div>
                <div class="nav-item">
                    <i class="fa-regular fa-user"></i>
                    <span>الحساب</span>
                </div>
            </nav>
        </section>

        <section id="cart-page" class="page">
            <header class="cart-header">
                <i class="fa-solid fa-angle-right" onclick="navigateTo('home-page')"></i>
                <h2>السلة <span class="cart-count" id="cart-count-title">(1) منتجات</span></h2>
                <i class="fa-regular fa-trash-can" onclick="clearCart()"></i>
            </header>

            <div class="cart-content" id="cart-items-container">
                <div class="cart-item" id="single-cart-item">
                    <img src="https://dummyimage.com/80x80/eee/000.png&text=Product" alt="Product">
                    <div class="item-details">
                        <img src="https://dummyimage.com/150x30/fff/000.png&text=اسم+المنتج+صورة" style="width:100px; height:auto; border:none;">
                        <div class="item-price-row">
                            <span class="price">9,000 د.ع</span>
                            <div class="quantity-control">
                                <i class="fa-solid fa-minus qty-btn" onclick="updateQty(-1)"></i>
                                <span id="item-qty">1</span>
                                <i class="fa-solid fa-plus qty-btn" onclick="updateQty(1)"></i>
                            </div>
                        </div>
                    </div>
                    <i class="fa-regular fa-trash-can delete-item" onclick="removeSingleItem()"></i>
                    <div class="item-total">اجمالي المنتج <span id="item-total-price">9,000 د.ع</span></div>
                </div>
            </div>

            <div class="cart-summary" id="cart-summary-section">
                <div class="summary-row">
                    <span>الطلبات</span>
                    <span id="summary-subtotal">9,000 د.ع</span>
                </div>
                <div class="summary-row">
                    <span>الخصم</span>
                    <span>0 د.ع</span>
                </div>
                <div class="summary-row total-row">
                    <span>الإجمالي</span>
                    <span class="green-text" id="final-total">9,000 د.ع</span>
                </div>
                <button class="btn-primary" onclick="showCheckoutForm()">الدفع <i class="fa-solid fa-money-bill-1-wave"></i></button>
            </div>

            <div class="checkout-form" id="checkout-form-section" style="display: none;">
                <h3>معلومات التوصيل</h3>
                <input type="text" placeholder="الاسم الكامل" class="checkout-input">
                <input type="tel" placeholder="رقم الهاتف" class="checkout-input">
                <input type="text" placeholder="العنوان بالتفصيل" class="checkout-input">
                <button class="btn-primary" onclick="alert('تم تأكيد الطلب بنجاح!')">تأكيد الطلب <i class="fa-solid fa-check"></i></button>
            </div>
            
            <nav class="bottom-nav">
                <div class="nav-item" onclick="navigateTo('home-page')">
                    <i class="fa-solid fa-house"></i>
                    <span>الرئيسية</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-percent"></i>
                    <span>التخفيضات</span>
                </div>
                <div class="nav-item">
                    <i class="fa-regular fa-heart"></i>
                    <span>المفضلة</span>
                </div>
                <div class="nav-item">
                    <i class="fa-regular fa-user"></i>
                    <span>الحساب</span>
                </div>
            </nav>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
